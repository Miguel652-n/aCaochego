<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — aCãochego</title>
  <link href="https://fonts.googleapis.com/css2?family=Chewy&family=Barrio&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="admin.css" />
  <link rel="shortcut icon" href="Assets/favicon2.png" type="image/x-icon">
</head>
<body>
<!-- TELA DE LOGIN -->
<div id="tela-login">
  <h1>aCãochego</h1>
  <p>Área restrita — acesso administrativo</p>
  <div class="login-box">
    <input type="text" id="usuario" placeholder="Usuário" />
    <input type="password" id="senha" placeholder="Senha" />
    <p id="erro-login">Usuário ou senha incorretos</p>
    <button class="btn-login" onclick="fazerLogin()">Entrar</button>
  </div>
</div>

<!-- TELA ADMIN -->
<div id="tela-admin">
  <header>
    <h1>Painel Admin — aCãochego</h1>
    <div style="display:flex;align-items:center;gap:16px;">
      <span id="ultimo-update"></span>
      <button class="btn-sair" onclick="sair()">Sair</button>
    </div>
  </header>

  <div class="dashboard">

    <!-- RESUMO -->
    <div class="resumo">
      <div class="card-resumo">
        <div class="numero" id="total-colabs">—</div>
        <div class="label">Formulários enviados</div>
      </div>
      <div class="card-resumo roxo">
        <div class="numero" id="total-com-animal">—</div>
        <div class="label">Com animal escolhido</div>
      </div>
      <div class="card-resumo amarelo">
        <div class="numero" id="total-sem-animal">—</div>
        <div class="label">Sem animal vinculado</div>
      </div>
    </div>

    <!-- CONTROLES -->
    <div class="controles">
      <input class="busca" id="busca" type="text" placeholder="Buscar por nome ou email..." oninput="filtrar()" />
      <select class="filtro-animal" id="filtro-animal" onchange="filtrar()">
        <option value="">Todos os animais</option>
      </select>
      <button class="btn-atualizar" onclick="carregarColabs()">
        <i class="bi bi-arrow-clockwise"></i> Atualizar
      </button>
    </div>

    <!-- TABELA -->
    <div class="tabela-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Nome</th>
            <th>Email</th>
            <th>Contato</th>
            <th>Cidade / Estado</th>
            <th>Animal</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tabela-body">
          <tr><td colspan="7"><div class="estado"><i class="bi bi-hourglass-split"></i>Carregando...</div></td></tr>
        </tbody>
      </table>
      <div class="rodape-tabela" id="rodape">—</div>
    </div>
  </div>
</div>

<!-- MODAL DETALHE -->
<div class="overlay" id="overlay" onclick="fecharModal(event)">
  <div class="modal" id="modal">
    <button class="btn-fechar-modal" onclick="document.getElementById('overlay').classList.remove('ativo')">
      <i class="bi bi-x-lg"></i>
    </button>
    <h2 id="modal-nome"></h2>
    <div id="modal-conteudo"></div>
  </div>
</div>
<script src="admin.js"></script>
</body>
</html>
